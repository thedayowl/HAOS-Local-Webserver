server.modules = ("mod_accesslog", "mod_indexfile", "mod_proxy", "mod_wstunnel")

server.document-root = "/config/local-www"
server.port = 8099
server.bind = "0.0.0.0"

index-file.names = ( "index.html", "index.htm" )

# WebSocket proxy for Home Assistant API
$HTTP["url"] =~ "^/api/websocket" {
  proxy.server = ( "" => (( "host" => "172.16.11.13", "port" => 8123 )))
  wstunnel.server = ( "/api/websocket" => (( "host" => "172.16.11.13", "port" => 8123 )))
  wstunnel.forward-mask = 1
}

mimetype.assign = (
  ".html" => "text/html",
  ".css"  => "text/css",
  ".js"   => "application/javascript",
  ".json" => "application/json",
  ".png"  => "image/png",
  ".jpg"  => "image/jpeg",
  ".svg"  => "image/svg+xml",
  ".ico"  => "image/x-icon",
  ".woff2" => "font/woff2"
)

accesslog.filename = "/proc/1/fd/1"
server.errorlog    = "/proc/1/fd/2"
